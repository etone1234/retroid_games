<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>retroid_games</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {background:linear-gradient(90deg,#7c3aed,#06b6d4);padding:20px;text-align:center;font-size:28px;font-weight:bold;}
.container {padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card {background:#1e293b;border-radius:15px;padding:15px;box-shadow:0 0 10px rgba(0,0,0,0.5);}
.card img {width:100%;border-radius:10px;}
.price {color:#22c55e;font-size:20px;margin:10px 0;}
button {background:#06b6d4;border:none;padding:10px;border-radius:10px;color:white;cursor:pointer;width:100%;}
button:hover {background:#0891b2;}
#cart {position:fixed;top:10px;right:10px;background:#020617;padding:15px;border-radius:10px;width:250px;}
#cart h3 {margin-top:0;}
.cart-item {font-size:14px;margin-bottom:5px;}
.checkout {background:#22c55e;margin-top:10px;}
</style>
</head>

<body>

<header>🎮 RETROID_GAMES</header>

<div id="cart">
  <h3>🛒 Carrito</h3>
  <div id="cart-items"></div>
  <div id="total">Total: $0</div>
  <button class="checkout" onclick="checkout()">Pagar</button>
</div>

<div class="container">

  <div class="card">
    <img src="4412a3d7-9d43-40f8-8739-ddb44071adf2.__CR126,0,1099,824_PT0_SX600_V1___">
    <h2>Retroid Pocket 4 Pro</h2>
    <div class="price">$199</div>
    <button onclick="addToCart('Retroid Pocket 4 Pro',199)">Agregar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h2>AYN Odin 2</h2>
    <div class="price">$299</div>
    <button onclick="addToCart('AYN Odin 2',299)">Agregar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h2>Anbernic RG556</h2>
    <div class="price">$179</div>
    <button onclick="addToCart('Anbernic RG556',179)">Agregar</button>
  </div>

</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let cartItems = document.getElementById('cart-items');
  cartItems.innerHTML = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    cartItems.innerHTML += <div class="cart-item">${item.name} - $${item.price}</div>;
  });

  document.getElementById('total').innerText = 'Total: $' + total;
}

function checkout() {
  if(cart.length === 0){
    alert('Carrito vacío');
  } else {
    let mensaje = "Hola, quiero comprar:%0A";
    let total = 0;

    cart.forEach(item => {
      mensaje += "- " + item.name + " $" + item.price + "%0A";
      total += item.price;
    });

    mensaje += "%0ATotal: $" + total;

    let numero = "591XXXXXXXX"; // 👈 CAMBIA ESTO POR TU NUMERO

    window.open("https://wa.me/" + numero + "?text=" + mensaje, "_blank");
  }
}
</script>

</body>
</html>
