<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>retroid_games</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {background:linear-gradient(90deg,#7c3aed,#06b6d4);padding:20px;text-align:center;font-size:28px;font-weight:bold;}
.container {padding:20px;display:grid;grid-template-columns:repeat(3, 1fr);gap:20px;}
.card {background:#1e293b;border-radius:15px;padding:15px;box-shadow:0 0 10px rgba(0,0,0,0.5);}
.card img {width:100%;border-radius:10px;}
.price {color:#22c55e;font-size:20px;margin:10px 0;}
button {background:#06b6d4;border:none;padding:10px;border-radius:10px;color:white;cursor:pointer;width:100%;}
button:hover {background:#0891b2;}
#cart {position:fixed;top:10px;right:10px;background:#020617;padding:15px;border-radius:10px;width:250px;}
#cart h3 {margin-top:0;}
.cart-item {font-size:14px;margin-bottom:5px;}
.checkout {background:#22c55e;margin-top:10px;}
</style>
</head>

<body>

<header>🎮 RETROID_GAMES (BOLIVIA)</header>

<div id="cart">
  <h6>🛒 Carrito</h6>
  <div id="cart-items"></div>
  <div id="total">Total: Bs.0</div>
  <button class="checkout" onclick="checkout()">Pagar</button>
</div>

<div class="container">

  <div class="card">
    <img src="retroid pocket 5.jpg">
    <h1>Retroid Pocket 5</h1>
    <div class="price">Bs.3300</div>
    <button onclick="addToCart('Retroid Pocket 5',3300)">Agregar</button>
  </div>

  <div class="card">
    <img src="odin2portal.jpg">
    <h2>AYN Odin 2 Portal Pro</h2>
    <div class="price">Bs.6000</div>
    <button onclick="addToCart('AYN Odin 2 Portal Pro',6000)">Agregar</button>
  </div>

  <div class="card">
    <img src="anbernic rg477v.jpg">
    <h3>Anbernic RG477V</h3>
    <div class="price">Bs.3300</div>
    <button onclick="addToCart('Anbernic RG477V',3300)">Agregar</button>
  </div>

  <div class="card">
    <img src="ayn thor.jpg">
    <h4>AYN Thor Pro</h4>
    <div class="price">Bs.6000</div>
    <button onclick="addToCart('AYN Thor Pro',6000)">Agregar</button>
  </div>

  <div class="card">
    <img src="retroid pocket 6.jpg">
    <h5>Retroid Pocket 6</h5>
    <div class="price">Bs.4000</div>
    <button onclick="addToCart('retroid pocket 6',4000)">Agregar</button>
  </div>

  <div class="card">
    <img src="odin 3.jpg">
    <h6>AYN Odin 3 Pro</h6>
    <div class="price">Bs.6300</div>
    <button onclick="addToCart('AYN Odin 3 Pro',6300)">Agregar</button>
  </div>



</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let cartItems = document.getElementById('cart-items');
  cartItems.innerHTML = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    cartItems.innerHTML += `<div class="cart-item">${item.name} - Bs. ${item.price}</div>`;
  });

  document.getElementById('total').innerText = 'Total: $' + total;
}

function checkout() {
  if(cart.length === 0){
    alert('Carrito vacío');
  } else {
    let mensaje = "Hola, quiero comprar:%0A";
    let total = 0;

    cart.forEach(item => {
      mensaje += "- " + item.name + " $" + item.price + "%0A";
      total += item.price;
    });

    mensaje += "%0ATotal: $" + total;

    let numero = "59162347612"; // 👈 CAMBIA ESTO POR TU NUMERO

    window.open("https://wa.me/" + 59162347612 + "?text=" + mensaje, "_blank");
  }
}
</script>

</body>
</html>
