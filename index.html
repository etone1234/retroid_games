<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETROID_GAMES | Store Bolivia</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --neon-purple: #7c3aed;
        --neon-cyan: #06b6d4;
        --neon-green: #22c55e;
        --dark-bg: #020617;
    }

    body {
        margin: 0;
        font-family: 'Rajdhani', sans-serif;
        background-color: var(--dark-bg);
        background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                          radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        color: white;
        overflow-x: hidden;
    }

    header {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        padding: 30px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        border-bottom: 2px solid var(--neon-purple);
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
    }

    #sound-control {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2000;
        background: var(--neon-purple);
        border: none;
        color: white;
        padding: 10px;
        border-radius: 50%;
        cursor: pointer;
        width: 50px;
        height: 50px;
        box-shadow: 0 0 15px var(--neon-purple);
    }

    .container {
        padding: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        margin-right: 320px;
    }

    .card {
        background: rgba(30, 41, 59, 0.6);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
    }

    .card:hover {
        border-color: var(--neon-cyan);
        transform: translateY(-5px);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: contain;
        margin-bottom: 15px;
    }

    .price {
        font-size: 24px;
        color: var(--neon-green);
        font-weight: bold;
        margin-bottom: 15px;
    }

    .btn-add {
        background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
        border: none;
        padding: 12px;
        border-radius: 10px;
        color: white;
        font-family: 'Orbitron', sans-serif;
        cursor: pointer;
        width: 100%;
    }

    #cart {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(15, 23, 42, 0.95);
        padding: 20px;
        border-radius: 20px;
        width: 260px;
        border: 1px solid var(--neon-purple);
    }

    .checkout {
        background: var(--neon-green);
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    footer {
        padding: 40px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        color: var(--neon-cyan);
    }

    @media (max-width: 900px) {
        .container { margin-right: 0; margin-bottom: 350px; }
        #cart { position: fixed; bottom: 0; top: auto; right: 0; width: 100%; border-radius: 20px 20px 0 0; }
    }
</style>
</head>
<body>

<audio id="soundHover" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>
<audio id="soundAdd" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>
<audio id="soundWater" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/701/701-preview.mp3" type="audio/mpeg">
</audio>

<button id="sound-control" onclick="unlockAudio()">
    <i id="sound-icon" class="fas fa-volume-up"></i>
</button>

<header>🎮 RETROID_GAMES BOLIVIA</header>

<div id="cart">
    <h3 style="text-align: center; color: var(--neon-purple); font-family: 'Orbitron';">CARRITO</h3>
    <div id="cart-items"></div>
    <div id="total" style="text-align: center; margin: 10px 0; font-family: 'Orbitron'; color: var(--neon-cyan);">Total: Bs. 0</div>
    <button class="checkout" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> PAGAR POR WHATSAPP
    </button>
</div>

<div class="container">
    <div class="card" onmouseover="playHover()">
        <img src="retroid pocket 5.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">Retroid Pocket 5</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 5', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playHover()">
        <img src="odin2portal.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">AYN Odin 2 Portal Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 2 Portal Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playHover()">
        <img src="anbernic rg477v.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">Anbernic RG477V</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Anbernic RG477V', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playHover()">
        <img src="ayn thor.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">AYN Thor Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Thor Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playHover()">
        <img src="retroid pocket 6.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">Retroid Pocket 6</h2>
        <div class="price">Bs. 4000</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 6', 4000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playHover()">
        <img src="odin 3.jpg">
        <h2 style="font-family: 'Orbitron'; font-size: 1rem;">AYN Odin 3 Pro</h2>
        <div class="price">Bs. 6300</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 3 Pro', 6300)">+ AGREGAR</button>
    </div>
</div>

<footer>
    <p>📍 LA PAZ - BOLIVIA</p>
</footer>

<script>
let cart = [];
let soundEnabled = true;
let audioUnlocked = false;

function unlockAudio() {
    audioUnlocked = true;
    soundEnabled = !soundEnabled;
    const icon = document.getElementById('sound-icon');
    icon.className = soundEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute';
    
    // Desbloqueo inicial
    document.getElementById('soundHover').play().then(() => {
        document.getElementById('soundHover').pause();
    }).catch(e => {});
}

function playHover() {
    if(soundEnabled && audioUnlocked) {
        let s = document.getElementById('soundHover');
        s.volume = 0.2;
        s.currentTime = 0;
        s.play().catch(e => {});
    }
}

function addToCart(name, price) {
    if(!audioUnlocked) audioUnlocked = true;
    cart.push({name, price});
    if(soundEnabled) {
        let s = document.getElementById('soundAdd');
        s.currentTime = 0;
        s.play().catch(e => {});
    }
    renderCart();
}

function renderCart() {
    let cartItems = document.getElementById('cart-items');
    cartItems.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
        total += item.price;
        cartItems.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px; border-bottom: 1px solid rgba(255,255,255,0.1)">
            <span>${item.name}</span><span>Bs.${item.price}</span></div>`;
    });
    document.getElementById('total').innerText = 'Total: Bs. ' + total;
}

function checkout() {
    if(cart.length === 0) return alert('El carrito está vacío');
    
    // Reproduce el sonido de la GOTA DE AGUA
    if(soundEnabled) {
        let s = document.getElementById('soundWater');
        s.play().catch(e => {});
    }
    
    setTimeout(() => {
        let mensaje = "¡Hola RETROID_GAMES! Quisiera comprar:%0A%0A";
        cart.forEach(item => mensaje += "• " + item.name + " (Bs. " + item.price + ")%0A");
        mensaje += "%0A*Total: Bs. " + cart.reduce((a, b) => a + b.price, 0) + "*%0A📍 La Paz - Bolivia";
        window.open("https://wa.me/59162347612?text=" + mensaje, "_blank");
    }, 500);
}
</script>
</body>
</html>
