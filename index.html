<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETROID_GAMES | Store Bolivia</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --neon-purple: #7c3aed;
        --neon-cyan: #06b6d4;
        --neon-green: #22c55e;
        --dark-bg: #020617;
    }

    /* Estilos Generales y Animaciones de Fondo */
    body {
        margin: 0;
        font-family: 'Rajdhani', sans-serif;
        background-color: var(--dark-bg);
        background-image: 
            radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        color: white;
        overflow-x: hidden;
    }

    /* Animaciones */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }

    @keyframes pulse-green {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
        70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
        100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    /* Header Estilo Cyberpunk */
    header {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        padding: 30px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        border-bottom: 2px solid var(--neon-purple);
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        letter-spacing: 3px;
    }

    /* Contenedor de Productos */
    .container {
        padding: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        margin-right: 320px;
    }

    /* Tarjetas de Consolas */
    .card {
        background: rgba(30, 41, 59, 0.6);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        animation: fadeInUp 0.8s ease backwards;
    }

    .card:hover {
        transform: translateY(-10px);
        border-color: var(--neon-cyan);
        box-shadow: 0 0 25px rgba(6, 182, 212, 0.4);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: contain;
        margin-bottom: 15px;
        animation: float 4s ease-in-out infinite;
    }

    .card h2 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.1rem;
        color: var(--neon-cyan);
        margin: 10px 0;
    }

    .price {
        font-size: 24px;
        color: var(--neon-green);
        font-weight: bold;
        margin-bottom: 15px;
    }

    /* Botones Neón */
    .btn-add {
        background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
        border: none;
        padding: 12px;
        border-radius: 10px;
        color: white;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }

    .btn-add:hover {
        filter: brightness(1.2);
        box-shadow: 0 0 15px var(--neon-cyan);
    }

    /* Carrito Flotante */
    #cart {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(15, 23, 42, 0.95);
        padding: 20px;
        border-radius: 20px;
        width: 260px;
        border: 1px solid var(--neon-purple);
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        z-index: 1000;
    }

    #cart h3 {
        font-family: 'Orbitron', sans-serif;
        font-size: 18px;
        color: var(--neon-purple);
        text-align: center;
        margin-top: 0;
    }

    .cart-item {
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #total {
        font-family: 'Orbitron', sans-serif;
        text-align: center;
        font-size: 18px;
        color: var(--neon-cyan);
        margin: 15px 0;
    }

    .checkout {
        background: var(--neon-green);
        border: none;
        padding: 12px;
        width: 100%;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        animation: pulse-green 2s infinite;
    }

    /* Footer / Dirección */
    .footer {
        background: rgba(15, 23, 42, 0.9);
        padding: 40px;
        text-align: center;
        border-top: 1px solid var(--neon-purple);
        margin-top: 50px;
        font-family: 'Orbitron', sans-serif;
    }

    .footer-content {
        color: var(--neon-cyan);
        font-size: 18px;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .footer-line {
        width: 60px;
        height: 3px;
        background: var(--neon-purple);
        margin: 15px auto;
        box-shadow: 0 0 10px var(--neon-purple);
    }

    /* Responsivo Celulares */
    @media (max-width: 900px) {
        .container { margin-right: 0; padding: 20px; margin-bottom: 350px; }
        #cart { position: fixed; bottom: 0; top: auto; right: 0; width: 100%; border-radius: 20px 20px 0 0; }
    }
</style>
</head>

<body>

<header>🎮 RETROID_GAMES BOLIVIA</header>

<div id="cart">
    <h3><i class="fas fa-shopping-cart"></i> MI PEDIDO</h3>
    <div id="cart-items"></div>
    <div id="total">Total: Bs. 0</div>
    <button class="checkout" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> ENVIAR A WHATSAPP
    </button>
</div>

<div class="container">
    <div class="card" style="animation-delay: 0.1s;">
        <img src="retroid pocket 5.jpg" alt="RP5">
        <h2>Retroid Pocket 5</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 5', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" style="animation-delay: 0.2s;">
        <img src="odin2portal.jpg" alt="Odin 2">
        <h2>AYN Odin 2 Portal Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 2 Portal Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" style="animation-delay: 0.3s;">
        <img src="anbernic rg477v.jpg" alt="RG477V">
        <h2>Anbernic RG477V</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Anbernic RG477V', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" style="animation-delay: 0.4s;">
        <img src="ayn thor.jpg" alt="Thor Pro">
        <h2>AYN Thor Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Thor Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" style="animation-delay: 0.5s;">
        <img src="retroid pocket 6.jpg" alt="RP6">
        <h2>Retroid Pocket 6</h2>
        <div class="price">Bs. 4000</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 6', 4000)">+ AGREGAR</button>
    </div>

    <div class="card" style="animation-delay: 0.6s;">
        <img src="odin 3.jpg" alt="Odin 3">
        <h2>AYN Odin 3 Pro</h2>
        <div class="price">Bs. 6300</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 3 Pro', 6300)">+ AGREGAR</button>
    </div>
</div>

<footer class="footer">
    <div class="footer-content">
        <i class="fas fa-map-marker-alt"></i> 
        <span>DIRECCIÓN: LA PAZ - BOLIVIA</span>
    </div>
    <div class="footer-line"></div>
</footer>

<script>
let cart = [];

function addToCart(name, price) {
    cart.push({name, price});
    renderCart();
}

function renderCart() {
    let cartItems = document.getElementById('cart-items');
    cartItems.innerHTML = '';
    let total = 0;

    cart.forEach(item => {
        total += item.price;
        cartItems.innerHTML += `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>Bs. ${item.price}</span>
            </div>`;
    });

    document.getElementById('total').innerText = 'Total: Bs. ' + total;
}

function checkout() {
    if(cart.length === 0){
        alert('El carrito está vacío');
    } else {
        let mensaje = "¡Hola! Quisiera comprar estas consolas:%0A%0A";
        let total = 0;

        cart.forEach(item => {
            mensaje += "🕹️ " + item.name + " (Bs. " + item.price + ")%0A";
            total += item.price;
        });

        mensaje += "%0A*Total: Bs. " + total + "*";
        mensaje += "%0A📍 Dirección: La Paz, Bolivia";

        // Tu número ya configurado
        let numero = "59162347612"; 
        window.open("https://wa.me/" + numero + "?text=" + mensaje, "_blank");
    }
}
</script>

</body>
</html>
