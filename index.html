<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETROID_GAMES | Store Bolivia</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --neon-purple: #7c3aed;
        --neon-cyan: #06b6d4;
        --neon-green: #22c55e;
        --dark-bg: #020617;
    }

    body {
        margin: 0;
        font-family: 'Rajdhani', sans-serif;
        background-color: var(--dark-bg);
        background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                          radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        color: white;
        overflow-x: hidden;
    }

    header {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        padding: 30px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 28px;
        border-bottom: 2px solid var(--neon-purple);
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        letter-spacing: 3px;
    }

    /* Control de Sonido */
    #sound-control {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2000;
        background: var(--neon-purple);
        border: none;
        color: white;
        padding: 10px;
        border-radius: 50%;
        cursor: pointer;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 15px var(--neon-purple);
    }

    .container {
        padding: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
        margin-right: 320px;
    }

    .card {
        background: rgba(30, 41, 59, 0.6);
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        animation: fadeInUp 0.8s ease backwards;
    }

    .card:hover {
        border-color: var(--neon-cyan);
        transform: translateY(-5px);
        box-shadow: 0 0 25px rgba(6, 182, 212, 0.3);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: contain;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .card:hover img { transform: scale(1.05); }

    .price {
        font-size: 24px;
        color: var(--neon-green);
        font-weight: bold;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
    }

    .btn-add {
        background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
        border: none;
        padding: 12px;
        border-radius: 10px;
        color: white;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }

    .btn-add:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--neon-cyan); }

    /* Carrito */
    #cart {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(15, 23, 42, 0.95);
        padding: 20px;
        border-radius: 20px;
        width: 260px;
        border: 1px solid var(--neon-purple);
        backdrop-filter: blur(10px);
        z-index: 1000;
    }

    #cart h3 { font-family: 'Orbitron'; color: var(--neon-purple); text-align: center; margin-top: 0; }

    .cart-item {
        font-size: 14px;
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding-bottom: 4px;
    }

    #total { font-family: 'Orbitron'; text-align: center; color: var(--neon-cyan); margin: 15px 0; }

    .checkout {
        background: var(--neon-green);
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: 0.3s;
    }

    .checkout:hover { filter: brightness(1.1); transform: scale(1.02); }

    /* Footer y Redes */
    footer {
        background: rgba(15, 23, 42, 0.9);
        padding: 40px 20px;
        text-align: center;
        border-top: 2px solid var(--neon-purple);
        margin-top: 50px;
        font-family: 'Orbitron', sans-serif;
    }

    .social-links {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }

    .social-btn {
        text-decoration: none;
        color: white;
        padding: 10px 25px;
        border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.1);
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .tiktok:hover { background: #000; border-color: #ff0050; box-shadow: 0 0 15px #ff0050; transform: translateY(-5px); }
    .facebook:hover { background: #1877f2; border-color: #fff; box-shadow: 0 0 15px #1877f2; transform: translateY(-5px); }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
        .container { margin-right: 0; margin-bottom: 380px; }
        #cart { position: fixed; bottom: 0; top: auto; right: 0; width: 100%; border-radius: 20px 20px 0 0; }
    }
</style>
</head>
<body>

<audio id="soundHover" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="soundAdd" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="soundCustom" src="notification_message-notification-22-270130.mp3"></audio>

<button id="sound-control" onclick="toggleSound()">
    <i id="sound-icon" class="fas fa-volume-up"></i>
</button>

<header>🎮 RETROID_GAMES BOLIVIA</header>

<div id="cart">
    <h3>CARRITO</h3>
    <div id="cart-items"></div>
    <div id="total">Total: Bs. 0</div>
    <button class="checkout" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
    </button>
</div>

<div class="container">
    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="retroid pocket 5.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Retroid Pocket 5</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 5', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="odin2portal.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">AYN Odin 2 Portal Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 2 Portal Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="anbernic rg477v.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Anbernic RG477V</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="addToCart('Anbernic RG477V', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="ayn thor.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">AYN Thor Pro</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="addToCart('AYN Thor Pro', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="retroid pocket 6.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Retroid Pocket 6</h2>
        <div class="price">Bs. 4000</div>
        <button class="btn-add" onclick="addToCart('Retroid Pocket 6', 4000)">+ AGREGAR</button>
    </div>

    <div class="card" onmouseover="playEffect('soundHover')">
        <img src="odin 3.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">AYN Odin 3 Pro</h2>
        <div class="price">Bs. 6300</div>
        <button class="btn-add" onclick="addToCart('AYN Odin 3 Pro', 6300)">+ AGREGAR</button>
    </div>
</div>

<footer>
    <div style="margin-bottom: 20px;">
        <i class="fas fa-map-marker-alt" style="color: var(--neon-purple);"></i>
        <span style="color: var(--neon-cyan); letter-spacing: 2px;"> LA PAZ - BOLIVIA</span>
    </div>
    
    <div class="social-links">
        <a href="https://www.tiktok.com/@retroid_games?_r=1&_t=ZS-95gT81htdsC" target="_blank" class="social-btn tiktok">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="https://www.facebook.com/TU_PAGINA" target="_blank" class="social-btn facebook">
            <i class="fab fa-facebook"></i> Facebook
        </a>
    </div>
</footer>

<script>
let cart = [];
let soundEnabled = true;

function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-icon').className = soundEnabled ? 'fas fa-volume-up' : 'fas fa-volume-mute';
}

function playEffect(id) {
    if(soundEnabled) {
        const s = document.getElementById(id);
        s.currentTime = 0;
        s.play().catch(() => {});
    }
}

function addToCart(name, price) {
    cart.push({name, price});
    playEffect('soundAdd');
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cart-items');
    list.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
        total += item.price;
        list.innerHTML += `<div class="cart-item"><span>${item.name}</span><span>Bs.${item.price}</span></div>`;
    });
    document.getElementById('total').innerText = 'Total: Bs. ' + total;
}

function checkout() {
    if(cart.length === 0) return alert('El carrito está vacío');
    
    // REPRODUCE TU AUDIO PERSONALIZADO
    playEffect('soundCustom');
    
    setTimeout(() => {
        let text = "¡Hola RETROID_GAMES! Quisiera comprar:%0A%0A";
        cart.forEach(i => text += "• " + i.name + " (Bs. " + i.price + ")%0A");
        text += "%0A*Total: Bs. " + cart.reduce((a, b) => a + b.price, 0) + "*%0A📍 La Paz - Bolivia";
        window.open("https://wa.me/59162347612?text=" + text, "_blank");
    }, 800);
}
</script>
</body>
</html>
