<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETROID_GAMES | Store Bolivia</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    :root {
        --neon-purple: #7c3aed;
        --neon-cyan: #06b6d4;
        --neon-green: #22c55e;
        --neon-red: #ef4444;
        --dark-bg: #020617;
    }

    body {
        margin: 0;
        font-family: 'Rajdhani', sans-serif;
        background-color: var(--dark-bg);
        background-image: radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                          radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
        color: white;
        overflow-x: hidden;
    }

    header {
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(10px);
        padding: 25px;
        text-align: center;
        border-bottom: 2px solid var(--neon-purple);
        box-shadow: 0 0 25px rgba(124, 58, 237, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        min-height: 120px;
    }

    .header-logo {
        max-height: 100px;
        width: auto;
        filter: drop-shadow(0 0 10px var(--neon-purple));
    }

    .brand-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
    }

    .header-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 2.8rem;
        font-weight: 700;
        background: linear-gradient(to right, #ffffff, var(--neon-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
        line-height: 1;
        text-transform: uppercase;
    }

    .header-subtitle {
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.1rem;
        color: var(--neon-cyan);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 5px;
    }

    .container { 
        padding: 40px; 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 30px; 
        margin-right: 320px; 
    }

    .card { 
        background: rgba(30, 41, 59, 0.6); 
        border-radius: 20px; 
        padding: 25px; 
        text-align: center; 
        border: 1px solid rgba(255,255,255,0.1); 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        cursor: pointer;
    }

    .card:hover {
        transform: translateY(-15px) scale(1.05);
        border-color: var(--neon-cyan);
        box-shadow: 0 0 35px rgba(6, 182, 212, 0.4);
    }

    .card img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 20px; transition: 0.4s; }
    .card:hover img { transform: scale(1.1); }

    .price { font-size: 26px; color: var(--neon-green); font-weight: bold; font-family: 'Orbitron'; margin-bottom: 15px; }
    .btn-add { background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan)); border: none; padding: 12px; border-radius: 10px; color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }

    #cart {
        position: fixed;
        top: 20px; right: 20px;
        background: rgba(15, 23, 42, 0.98);
        padding: 20px; border-radius: 20px;
        width: 280px; border: 1px solid var(--neon-purple);
        z-index: 1000; max-height: 80vh; overflow-y: auto;
    }

    .modal {
        display: none; position: fixed; z-index: 3000;
        left: 0; top: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
    }
    .modal-content {
        background: #0f172a; margin: 5% auto; padding: 30px;
        border: 2px solid var(--neon-cyan); width: 85%; max-width: 500px;
        border-radius: 25px; text-align: center;
    }
    .specs-list { text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; }
    .specs-list li { margin-bottom: 10px; list-style: none; color: #e2e8f0; }

    footer {
        background: rgba(15, 23, 42, 0.95);
        padding: 40px 20px;
        text-align: center;
        border-top: 2px solid var(--neon-purple);
        margin-top: 50px;
    }
    .footer-location { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon-cyan); margin-bottom: 5px; }
    .footer-year { font-family: 'Orbitron'; font-size: 1.1rem; color: white; opacity: 0.7; margin-bottom: 20px; }
    .social-btn { text-decoration: none; color: white; padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
    .social-btn:hover { background: var(--neon-purple); border-color: var(--neon-purple); }

    @media (max-width: 1000px) {
        header { flex-direction: column; }
        .brand-text { align-items: center; text-align: center; }
        .container { margin-right: 0; margin-bottom: 350px; }
        #cart { position: fixed; bottom: 0; top: auto; right: 0; width: 100%; border-radius: 25px 25px 0 0; }
    }
</style>
</head>
<body onclick="startMusic()">

<audio id="bgMusic" loop><source src="04 Judgment -X- (Stage 1-1).mp3" type="audio/mpeg"></audio>
<audio id="soundCard" src="0420.MP3"></audio> <audio id="soundAdd" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="soundCustom" src="notification_message-notification-22-270130.mp3"></audio>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--neon-cyan);"></h2>
        <img id="modalImg" style="width:100%; max-height:200px; object-fit:contain; margin: 20px 0;">
        <ul id="modalSpecs" class="specs-list"></ul> <div id="modalPrice" class="price"></div>
        <button class="btn-add" id="modalAddBtn">AÑADIR AL CARRITO</button>
        <button onclick="closeModal()" style="background:none; border:none; color:gray; cursor:pointer; margin-top:15px; display:block; width:100%;">CERRAR</button>
    </div>
</div>

<header>
    <img src="logo.jpg" alt="Logo" class="header-logo">
    <div class="brand-text">
        <h1 class="header-title">RETROID GAMES</h1>
        <span class="header-subtitle">Retro Consoles Gaming For You</span>
    </div>
</header>

<div id="cart">
    <h3 style="font-family:'Orbitron'; color:var(--neon-purple); text-align:center;">CARRITO</h3>
    <div id="cart-items"></div>
    <div id="total" style="font-family:'Orbitron'; text-align:center; margin:15px 0; color:var(--neon-cyan);">Total: Bs. 0</div>
    <button class="btn-add" style="background:var(--neon-green)" onclick="checkout()">
        <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
    </button>
</div>

<div class="container">
    <div class="card" onclick="openSpecs('Retroid Pocket 5', 3300, 'retroid pocket 5.jpg', ['CPU: Snapdragon 865', 'RAM: 8GB LPDDR4x', 'Almacenamiento: 128GB UFS 3.1', 'Pantalla: 5.5p AMOLED 1080p'])">
        <img src="retroid pocket 5.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Retroid Pocket 5</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="event.stopPropagation(); addToCart('Retroid Pocket 5', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onclick="openSpecs('AYN Odin 2 Portal', 6000, 'odin2portal.jpg', ['CPU: Snapdragon 8 Gen 2', 'RAM: 12GB LPDDR5X', 'Almacenamiento: 512GB UFS 4.0', 'Pantalla: 7p OLED 120Hz'])">
        <img src="odin2portal.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">AYN Odin 2 Portal</h2>
        <div class="price">Bs. 6000</div>
        <button class="btn-add" onclick="event.stopPropagation(); addToCart('AYN Odin 2 Portal', 6000)">+ AGREGAR</button>
    </div>

    <div class="card" onclick="openSpecs('Anbernic RG477V', 3300, 'anbernic rg477v.jpg', ['CPU: Dimensity 8300', 'RAM: 8GB LPDDR5X', 'Pantalla: 4.7p 120Hz', 'Batería: 5,500 mAh'])">
        <img src="anbernic rg477v.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Anbernic RG477V</h2>
        <div class="price">Bs. 3300</div>
        <button class="btn-add" onclick="event.stopPropagation(); addToCart('Anbernic RG477V', 3300)">+ AGREGAR</button>
    </div>

    <div class="card" onclick="openSpecs('Retroid Pocket 6', 4000, 'retroid pocket 6.jpg', ['CPU: Snapdragon 8 Gen 2', 'RAM: 8GB LPDDR5x', 'Almacenamiento: 128GB', 'Pantalla: 5.5p AMOLED'])">
        <img src="retroid pocket 6.jpg">
        <h2 style="font-family:'Orbitron'; font-size:1rem;">Retroid Pocket 6</h2>
        <div class="price">Bs. 4000</div>
        <button class="btn-add" onclick="event.stopPropagation(); addToCart('Retroid Pocket 6', 4000)">+ AGREGAR</button>
    </div>
</div>

<footer>
    <div class="footer-location">La Paz - Bolivia</div>
    <div class="footer-year">2026</div>
    <a href="https://www.tiktok.com/@retroid_games" target="_blank" class="social-btn">
        <i class="fab fa-tiktok"></i> TikTok @retroid_games
    </a>
</footer>

<script>
let cart = [];
let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        document.getElementById('bgMusic').volume = 0.3;
        document.getElementById('bgMusic').play().catch(()=>{});
        musicStarted = true;
    }
}

function openSpecs(name, price, img, specs) {
    // REPRODUCIR SONIDO 0420.MP3
    const sound = document.getElementById('soundCard');
    sound.currentTime = 0;
    sound.play().catch(()=>{});

    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalImg').src = img;
    document.getElementById('modalPrice').innerText = 'Bs. ' + price;
    
    // LISTA DESGLOSADA
    let html = '';
    specs.forEach(s => html += `<li>⚡ ${s}</li>`);
    document.getElementById('modalSpecs').innerHTML = html;
    
    document.getElementById('modalAddBtn').onclick = () => { addToCart(name, price); closeModal(); };
    document.getElementById('productModal').style.display = "block";
}

function closeModal() { document.getElementById('productModal').style.display = "none"; }

function addToCart(name, price) {
    cart.push({name, price});
    document.getElementById('soundAdd').play().catch(()=>{});
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cart-items');
    list.innerHTML = '';
    let total = 0;
    cart.forEach((item, index) => {
        total += item.price;
        list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.9rem;">
            <span>${item.name}</span>
            <span style="color:var(--neon-green)">Bs.${item.price}</span>
        </div>`;
    });
    document.getElementById('total').innerText = 'Total: Bs. ' + total;
}

function checkout() {
    if(cart.length === 0) return alert('El carrito está vacío');
    document.getElementById('soundCustom').play().catch(()=>{});
    setTimeout(() => {
        let text = "¡Hola RETROID_GAMES! Quisiera comprar:%0A";
        cart.forEach(i => text += "• " + i.name + " (Bs. " + i.price + ")%0A");
        window.open("https://wa.me/59162347612?text=" + text, "_blank");
    }, 800);
}
</script>
</body>
</html>
